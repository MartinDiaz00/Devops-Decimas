apiVersion: apps/v1
kind: Deployment
metadata:
  name: supermercado-deployment
  labels:
    app: supermercado
spec:
  replicas: 2
  selector:
    matchLabels:
      app: supermercado
  template:
    metadata:
      labels:
        app: supermercado
    spec:
      containers:
        - name: supermercado-app
          image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: supermercado-service
spec:
  type: LoadBalancer
  selector:
    app: supermercado
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
