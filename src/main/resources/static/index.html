<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supermercado DevOps</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f6f8; color: #222; }
    header { background: #1f7a3f; color: white; padding: 24px; text-align: center; }
    main { max-width: 920px; margin: 25px auto; padding: 0 16px; }
    .card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 16px; box-shadow: 0 2px 10px #0001; }
    button { background: #1f7a3f; color: white; border: 0; padding: 10px 14px; border-radius: 8px; cursor: pointer; }
    button:hover { background: #155d2f; }
    input, select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin: 4px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
    .ok { color: #1f7a3f; font-weight: bold; }
    .error { color: #b00020; font-weight: bold; }
  </style>
</head>
<body>
  <header>
    <h1>Supermercado DevOps</h1>
    <p>Frontend simple conectado a un microservicio Spring Boot</p>
  </header>

  <main>
    <section class="card">
      <h2>Estado del microservicio</h2>
      <button onclick="probarPing()">Probar ping</button>
      <p id="ping"></p>
    </section>

    <section class="card">
      <h2>Productos disponibles</h2>
      <button onclick="cargarProductos()">Actualizar productos</button>
      <table>
        <thead>
          <tr><th>ID</th><th>Producto</th><th>Categoría</th><th>Precio</th><th>Stock</th></tr>
        </thead>
        <tbody id="tabla"></tbody>
      </table>
    </section>

    <section class="card">
      <h2>Comprar producto</h2>
      <label>ID producto:</label>
      <input id="productoId" type="number" value="1" min="1" />
      <label>Cantidad:</label>
      <input id="cantidad" type="number" value="1" min="1" />
      <button onclick="comprar()">Comprar</button>
      <p id="resultado"></p>
    </section>
  </main>

  <script>
    const API = '/api/supermercado';

    async function probarPing() {
      const res = await fetch(`${API}/ping`);
      const data = await res.json();
      document.getElementById('ping').innerHTML = `<span class="ok">${data.mensaje}</span> - ${data.fecha}`;
    }

    async function cargarProductos() {
      const res = await fetch(`${API}/productos`);
      const productos = await res.json();
      document.getElementById('tabla').innerHTML = productos.map(p => `
        <tr>
          <td>${p.id}</td>
          <td>${p.nombre}</td>
          <td>${p.categoria}</td>
          <td>$${p.precio}</td>
          <td>${p.stock}</td>
        </tr>
      `).join('');
    }

    async function comprar() {
      const productoId = Number(document.getElementById('productoId').value);
      const cantidad = Number(document.getElementById('cantidad').value);
      const res = await fetch(`${API}/comprar`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ productoId, cantidad })
      });
      const data = await res.json();
      if (!res.ok) {
        document.getElementById('resultado').innerHTML = `<span class="error">${data.error}</span>`;
        return;
      }
      document.getElementById('resultado').innerHTML = `<span class="ok">${data.mensaje}</span> Total pagado: $${data.totalPagado}`;
      cargarProductos();
    }

    probarPing();
    cargarProductos();
  </script>
</body>
</html>
