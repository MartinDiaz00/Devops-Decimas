name: CI Supermercado

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Build Maven
        run: mvn clean package -DskipTests
      - name: Build Docker image
        run: docker build -t supermercado-microservicio:test .
